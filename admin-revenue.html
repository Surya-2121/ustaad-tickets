<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Revenue Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    h2 { font-size: 1.2rem; margin: 24px 0 12px; color: #f0ad4e; }
    .updated { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
    .summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .summary-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px 24px; text-align: center; flex: 1; min-width: 140px; }
    .summary-num { font-size: 1.8rem; font-weight: 800; color: #f0ad4e; }
    .summary-label { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; margin-bottom: 32px; }
    th { background: #2a2a4a; text-align: left; padding: 12px 16px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 16px; border-bottom: 1px solid #2a2a4a; font-size: 0.93rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #22223a; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .revenue { color: #4caf50; font-weight: 700; }
    .pct { color: #f0ad4e; }
    .totals-row td { font-weight: 800; background: #2a2a4a; color: #f0ad4e; border-top: 2px solid #f0ad4e; }
    .refresh-btn { background: #f0ad4e; color: #000; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
    .refresh-btn:hover { background: #ec971f; }
    @media (max-width: 600px) {
      th, td { padding: 8px 10px; font-size: 0.8rem; }
      .summary-card { padding: 12px 16px; }
      .summary-num { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>Revenue Dashboard - Ustaad Bhagat Singh</h1>
  <div class="updated" id="updated"></div>
  <button class="refresh-btn" onclick="loadData()">Refresh</button>
  <div class="summary" id="summary"></div>

  <h2>Premiere Day - March 18</h2>
  <div class="summary" id="summary18"></div>
  <table>
    <thead>
      <tr>
        <th>City</th>
        <th>Cinema</th>
        <th>Time</th>
        <th class="num">Total Seats</th>
        <th class="num">Booked</th>
        <th class="num">Available</th>
        <th class="num">Booked %</th>
        <th class="num">Revenue</th>
      </tr>
    </thead>
    <tbody id="table18"></tbody>
  </table>

  <h2>All Shows - Complete</h2>
  <table>
    <thead>
      <tr>
        <th>City</th>
        <th>Cinema</th>
        <th>Date & Time</th>
        <th class="num">Total Seats</th>
        <th class="num">Booked</th>
        <th class="num">Available</th>
        <th class="num">Booked %</th>
        <th class="num">Revenue</th>
      </tr>
    </thead>
    <tbody id="tableAll"></tbody>
  </table>

  <script>
    function buildRows(shows) {
      let html = '';
      let totSeats = 0, totSold = 0, totAvail = 0, totRev = 0;

      shows.sort((a, b) => a.city.localeCompare(b.city));
      shows.forEach(s => {
        const pct = s.totalSeats > 0 ? ((s.sold / s.totalSeats) * 100).toFixed(1) : '0.0';
        html += '<tr><td>' + s.city + '</td><td>' + s.cinema + '</td><td>' + s.dateText + '</td>' +
          '<td class="num">' + s.totalSeats + '</td><td class="num">' + s.sold + '</td><td class="num">' + s.available + '</td>' +
          '<td class="num pct">' + pct + '%</td><td class="num revenue">&euro;' + s.revenue + '</td></tr>';
        totSeats += s.totalSeats;
        totSold += s.sold;
        totAvail += s.available;
        totRev += s.revenue;
      });

      const totPct = totSeats > 0 ? ((totSold / totSeats) * 100).toFixed(1) : '0.0';
      html += '<tr class="totals-row"><td>TOTAL</td><td>' + shows.length + ' shows</td><td></td>' +
        '<td class="num">' + totSeats + '</td><td class="num">' + totSold + '</td><td class="num">' + totAvail + '</td>' +
        '<td class="num">' + totPct + '%</td><td class="num">&euro;' + totRev + '</td></tr>';

      return { html, totSeats, totSold, totAvail, totRev, totPct };
    }

    function summaryHTML(label, data) {
      return '<div class="summary-card"><div class="summary-num">' + data.shows + '</div><div class="summary-label">Shows</div></div>' +
        '<div class="summary-card"><div class="summary-num">' + data.seats.toLocaleString() + '</div><div class="summary-label">Seats</div></div>' +
        '<div class="summary-card"><div class="summary-num">' + data.sold.toLocaleString() + '</div><div class="summary-label">Booked</div></div>' +
        '<div class="summary-card"><div class="summary-num">' + data.pct + '%</div><div class="summary-label">Booking %</div></div>' +
        '<div class="summary-card"><div class="summary-num revenue">&euro;' + data.rev.toLocaleString() + '</div><div class="summary-label">Revenue</div></div>';
    }

    async function loadData() {
      try {
        const resp = await fetch('seat_data.json?t=' + Date.now());
        const data = await resp.json();

        document.getElementById('updated').textContent = 'Last updated: ' + new Date(data.fetchedAt).toLocaleString('en-DE');

        // Overall summary
        document.getElementById('summary').innerHTML = summaryHTML('All', {
          shows: data.totalShows, seats: data.totalSeats, sold: data.totalBooked,
          pct: data.overallBookingPercent, rev: data.totalRevenue
        });

        // Split shows: March 18 vs all
        const shows18 = data.shows.filter(s => s.date === '2026-03-18');
        const allShows = data.shows;

        // March 18 table
        const r18 = buildRows(shows18);
        document.getElementById('table18').innerHTML = r18.html;
        document.getElementById('summary18').innerHTML = summaryHTML('Mar 18', {
          shows: shows18.length, seats: r18.totSeats, sold: r18.totSold,
          pct: r18.totPct, rev: r18.totRev
        });

        // All shows table
        const rAll = buildRows(allShows);
        document.getElementById('tableAll').innerHTML = rAll.html;

      } catch (e) {
        document.getElementById('tableAll').innerHTML = '<tr><td colspan="8" style="text-align:center;color:red;">Error loading data: ' + e.message + '</td></tr>';
      }
    }
    loadData();
  </script>
</body>
</html>
