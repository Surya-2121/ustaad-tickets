<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Shows Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    h2 { font-size: 1.2rem; margin: 24px 0 12px; color: #f0ad4e; }
    .updated { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
    .summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .summary-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px 24px; text-align: center; flex: 1; min-width: 140px; }
    .summary-num { font-size: 1.8rem; font-weight: 800; color: #f0ad4e; }
    .summary-label { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; margin-bottom: 32px; }
    th { background: #2a2a4a; text-align: left; padding: 12px 16px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 16px; border-bottom: 1px solid #2a2a4a; font-size: 0.93rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #22223a; }
    .totals-row td { font-weight: 800; background: #2a2a4a; color: #f0ad4e; border-top: 2px solid #f0ad4e; }
    .refresh-btn { background: #f0ad4e; color: #000; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
    .refresh-btn:hover { background: #ec971f; }
    .save-btn { background: #4caf50; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 12px; margin-left: 8px; }
    .save-btn:hover { background: #388e3c; }
    .section-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .capture-box { padding: 20px; background: #0a0a1a; }
    @media (max-width: 600px) {
      th, td { padding: 8px 10px; font-size: 0.8rem; }
      .summary-card { padding: 12px 16px; }
      .summary-num { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>Shows Dashboard - Ustaad Bhagat Singh</h1>
  <div class="updated" id="updated"></div>
  <button class="refresh-btn" onclick="loadData()">Refresh</button>
  <div class="summary" id="summary"></div>

  <div id="capture18" class="capture-box">
    <div class="section-header">
      <h2>Premiere Day - March 18</h2>
      <button class="save-btn" onclick="saveAsImage('capture18', 'premiere-march-18')">Save as Image</button>
    </div>
    <div class="summary" id="summary18"></div>
    <table>
      <thead>
        <tr>
          <th>City</th>
          <th>Cinema</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="table18"></tbody>
    </table>
  </div>

  <div id="captureAll" class="capture-box">
    <div class="section-header">
      <h2>All Shows - Complete</h2>
      <button class="save-btn" onclick="saveAsImage('captureAll', 'all-shows-complete')">Save as Image</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>City</th>
          <th>Cinema</th>
          <th>Date & Time</th>
        </tr>
      </thead>
      <tbody id="tableAll"></tbody>
    </table>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    function saveAsImage(elementId, filename) {
      const el = document.getElementById(elementId);
      const btns = el.querySelectorAll('.save-btn');
      btns.forEach(b => b.style.display = 'none');
      html2canvas(el, { backgroundColor: '#0a0a1a', scale: 2 }).then(canvas => {
        btns.forEach(b => b.style.display = '');
        const link = document.createElement('a');
        link.download = filename + '.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
      });
    }

    function buildRows(shows) {
      let html = '';
      shows.sort((a, b) => a.city.localeCompare(b.city));
      shows.forEach(s => {
        const timeStr = s.date + ' ' + s.time;
        html += '<tr><td>' + s.city + '</td><td>' + s.cinema + '</td><td>' + timeStr + '</td></tr>';
      });
      html += '<tr class="totals-row"><td>TOTAL</td><td>' + shows.length + ' shows</td><td></td></tr>';
      return { html, count: shows.length };
    }

    function summaryHTML(data) {
      return '<div class="summary-card"><div class="summary-num">' + data.shows + '</div><div class="summary-label">Shows</div></div>';
    }

    async function loadData() {
      try {
        const resp = await fetch('seat_data.json?t=' + Date.now());
        const data = await resp.json();

        document.getElementById('updated').textContent = 'Last updated: ' + new Date(data.fetchedAt).toLocaleString('en-DE');

        document.getElementById('summary').innerHTML = summaryHTML({ shows: data.totalShows });

        const shows18 = data.shows.filter(s => s.date === '2026-03-18');
        const allShows = data.shows;

        const r18 = buildRows(shows18);
        document.getElementById('table18').innerHTML = r18.html;
        document.getElementById('summary18').innerHTML = summaryHTML({ shows: shows18.length });

        const rAll = buildRows(allShows);
        document.getElementById('tableAll').innerHTML = rAll.html;

      } catch (e) {
        document.getElementById('tableAll').innerHTML = '<tr><td colspan="3" style="text-align:center;color:red;">Error loading data: ' + e.message + '</td></tr>';
      }
    }
    loadData();
  </script>
</body>
</html>
