  <main class="page-content">
    <h1 class="page-title">Contact Us</h1>
    <div class="page-text">
      <p>Have a question, suggestion, or want to screen a Telugu movie in your city? Get in touch!</p>
    </div>
    <form class="contact-form" action="https://formsubmit.co/info@germany-telugu-movies.com" method="POST">
      <input type="hidden" name="_subject" value="New contact from Germany Telugu Movies">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://germany-telugu-movies.com/contact.html?sent=true">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="city">City in Germany</label>
        <input type="text" id="city" name="city">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="book-btn" style="border:none;width:100%;">Send Message</button>
    </form>
    <div id="sentMsg" class="sent-msg" style="display:none;">Thank you! Your message has been sent.</div>
  </main>
