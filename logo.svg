<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- GERMANY -->
  <text x="240" y="62" text-anchor="middle" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="4" font-style="italic">GERMANY</text>
  <!-- TELUGU -->
  <text x="240" y="118" text-anchor="middle" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="2" font-style="italic">TELUGU</text>

  <!-- Thin line -->
  <line x1="20" y1="128" x2="460" y2="128" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- MOVIES -->
  <text x="240" y="150" text-anchor="middle" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="26" fill="#888" letter-spacing="16" font-style="italic">M O V I E S</text>
</svg>
