<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="100%" style="stop-color:#c78c2e"/>
    </linearGradient>
  </defs>

  <!-- Film strip left -->
  <g fill="url(#filmGrad)" opacity="0.9">
    <rect x="10" y="15" width="28" height="90" rx="3"/>
    <rect x="13" y="20" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="13" y="32" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="13" y="44" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="13" y="56" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="13" y="68" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="13" y="80" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="20" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="32" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="44" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="56" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="68" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="29" y="80" width="6" height="8" rx="1" fill="#0f0f1a"/>
  </g>

  <!-- Film strip right -->
  <g fill="url(#filmGrad)" opacity="0.9">
    <rect x="362" y="15" width="28" height="90" rx="3"/>
    <rect x="365" y="20" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="365" y="32" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="365" y="44" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="365" y="56" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="365" y="68" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="365" y="80" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="20" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="32" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="44" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="56" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="68" width="6" height="8" rx="1" fill="#0f0f1a"/>
    <rect x="381" y="80" width="6" height="8" rx="1" fill="#0f0f1a"/>
  </g>

  <!-- Main text -->
  <text x="200" y="48" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="30" fill="url(#gold)" letter-spacing="3">GERMANY</text>
  <text x="200" y="78" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="24" fill="#ffffff" letter-spacing="5">TELUGU MOVIES</text>

  <!-- Decorative line -->
  <line x1="80" y1="88" x2="320" y2="88" stroke="url(#gold)" stroke-width="2"/>

  <!-- Star accents -->
  <polygon points="80,55 83,62 90,62 84,67 86,74 80,70 74,74 76,67 70,62 77,62" fill="#f0ad4e" opacity="0.8"/>
  <polygon points="320,55 323,62 330,62 324,67 326,74 320,70 314,74 316,67 310,62 317,62" fill="#f0ad4e" opacity="0.8"/>

  <!-- Tagline -->
  <text x="200" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888" letter-spacing="3">PREMIERES ACROSS GERMANY</text>
</svg>
